services:
  postgres:
    image: postgres:18-alpine
    container_name: school_inventory_postgres
    restart: always
    environment:
      POSTGRES_DB: school_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: